name: E2E Tests

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb

      - run: pnpm install --frozen-lockfile

      - name: Install test-server dependencies
        working-directory: test-server
        run: npm ci

      - name: Install tauri-wd
        run: cargo install tauri-webdriver-automation

      - name: Disable macOS firewall
        if: matrix.platform == 'macos-latest'
        run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off

      - name: Run E2E tests (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: test-server
        env:
          WATTSON_NO_KEYCHAIN: "1"
          VITE_ENRICHMENT_DELAY_MS: "0"
        run: npx wdio run wdio.conf.js

      - name: Run E2E tests (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: test-server
        env:
          WATTSON_NO_KEYCHAIN: "1"
          VITE_ENRICHMENT_DELAY_MS: "0"
        run: xvfb-run npx wdio run wdio.conf.js

      - name: Run E2E tests (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: test-server
        env:
          WATTSON_NO_KEYCHAIN: "1"
          VITE_ENRICHMENT_DELAY_MS: "0"
        run: npx wdio run wdio.conf.js
